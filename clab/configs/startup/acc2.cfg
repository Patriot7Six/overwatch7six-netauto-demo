! acc2 - Access Switch - HQ-TX-01
! Generated startup config for Containerlab bootstrap
!
hostname acc2
!
username admin privilege 15 role network-admin secret admin
!
management api http-commands
   no shutdown
!
ip routing
!
interface Management0
   ip address 192.0.2.13/24
!
interface Loopback0
   ip address 10.255.255.4/32
!
interface Ethernet1
   description DIST1:Et3
   no switchport
   ip address 10.0.0.5/31
!
interface Ethernet2
   description ACCESS:Data
   switchport access vlan 10
!
interface Ethernet3
   description ACCESS:Voice
   switchport access vlan 20
!
interface Ethernet4
   description ACCESS:Guest
   switchport access vlan 30
!
vlan 10
   name Data
!
vlan 20
   name Voice
!
vlan 30
   name Guest
!
ip route 0.0.0.0/0 192.0.2.1
!
ntp server 192.0.2.1
!
banner motd |
*******************************************************************************
*  AUTHORIZED ACCESS ONLY — OVERWATCH7SIX HQ-TX-01                           *
*  Unauthorized access is prohibited and monitored.                           *
*  All connections are logged per CMMC 2.0 / NIST SP 800-171 AU-2.          *
*******************************************************************************
|
!
snmp-server engineID local f5717f001a2b3c50
snmp-server group OW7SIX-GRP v3 priv
snmp-server user OW7SIX-USER OW7SIX-GRP v3 auth sha OW7SIX-AUTH-PASS priv aes OW7SIX-PRIV-PASS
snmp-server host 192.0.2.2 vrf MGMT version 3 priv OW7SIX-USER
!
logging host 192.0.2.2 514
logging trap informational
logging on
!
aaa authentication login default local
aaa authorization exec default local
!
end
