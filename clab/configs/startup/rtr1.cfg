! rtr1 - Edge Router - HQ-TX-01
! Generated startup config for Containerlab bootstrap
! Full intended config rendered by Golden Config / make render
!
hostname rtr1
!
username admin privilege 15 role network-admin secret admin
!
management api http-commands
   no shutdown
!
management ssh
   idle-timeout 15
   authentication mode keyboard-interactive
!
ip routing
!
interface Management0
   ip address 192.0.2.10/24
!
interface Loopback0
   ip address 10.255.255.1/32
!
interface Ethernet1
   description DIST1:Et1
   no switchport
   ip address 10.0.0.0/31
!
ip route 0.0.0.0/0 192.0.2.1
!
ntp server 192.0.2.1
!
banner motd |
*******************************************************************************
*  AUTHORIZED ACCESS ONLY — OVERWATCH7SIX HQ-TX-01                           *
*  Unauthorized access is prohibited and monitored.                           *
*  All connections are logged per CMMC 2.0 / NIST SP 800-171 AU-2.          *
*******************************************************************************
|
!
snmp-server engineID local f5717f001a2b3c4d
snmp-server group OW7SIX-GRP v3 priv
snmp-server user OW7SIX-USER OW7SIX-GRP v3 auth sha OW7SIX-AUTH-PASS priv aes OW7SIX-PRIV-PASS
snmp-server host 192.0.2.2 vrf MGMT version 3 priv OW7SIX-USER
!
logging host 192.0.2.2 514
logging trap informational
logging on
!
aaa authentication login default local
aaa authorization exec default local
!
end
