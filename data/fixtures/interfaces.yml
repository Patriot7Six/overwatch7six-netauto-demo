    type: 1000base-t
    description: "RTR1:Et1"
    status: Active

  - device: dist1
    name: Ethernet2
    type: 1000base-t
    description: "ACC1:Et1"
    status: Active

  - device: dist1
    name: Ethernet3
    type: 1000base-t
    description: "ACC2:Et1"
    status: Active

  # acc1
