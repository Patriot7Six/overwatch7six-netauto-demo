---
# Nautobot interface fixtures for HQ-TX-01
# All cEOS interfaces use type: 1000base-t for simplicity

interfaces:
  # rtr1
  - device: rtr1
    name: Management0
    type: 1000base-t
    mgmt_only: true
    description: "OOB Management"
    status: Active

  - device: rtr1
    name: Loopback0
    type: virtual
    description: "Router-id / management loopback"
    status: Active

  - device: rtr1
    name: Ethernet1
    type: 1000base-t
    description: "DIST1:Et1"
    status: Active

  # dist1
