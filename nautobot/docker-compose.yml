---
# Nautobot 3.1.x stack — follows the official nautobot-docker-compose pattern
# https://github.com/nautobot/nautobot-docker-compose
#
# Services: nautobot (uWSGI), worker (Celery), beat (Celery Beat),
#           postgres (Postgres 14-alpine), redis (Redis 7-alpine)

version: "3.9"

x-nautobot-base: &nautobot-base
  image: "ghcr.io/nautobot/nautobot:${NAUTOBOT_VERSION:-3.1}-py${PYTHON_VER:-3.11}"
  env_file:
    - ./environment/creds.env
    - ./environment/local.env
  volumes:
    - ./jobs:/opt/nautobot/jobs:ro
    - nautobot-static:/opt/nautobot/static
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped

services:
  nautobot:
    <<: *nautobot-base
    container_name: nautobot
    ports:
      - "${NAUTOBOT_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  worker:
    <<: *nautobot-base
    container_name: nautobot-worker
    entrypoint:
      - "nautobot-server"
      - "celery"
      - "worker"
      - "--loglevel=INFO"
      - "--concurrency=2"
      - "-Q"
      - "default,celery"
    healthcheck:
      # CMD-SHELL required so the in-container shell expands $HOSTNAME at runtime
      test: ["CMD-SHELL", "nautobot-server celery inspect ping --destination celery@$$HOSTNAME || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  beat:
    <<: *nautobot-base
    container_name: nautobot-beat
    entrypoint:
      - "nautobot-server"
      - "celery"
      - "beat"
      - "--loglevel=INFO"
    healthcheck:
      disable: true

  postgres:
    image: "postgres:14-alpine"
    container_name: nautobot-postgres
    env_file:
      - ./environment/creds.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # CMD-SHELL so the container's own $POSTGRES_USER env var is expanded
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: "redis:7-alpine"
    container_name: nautobot-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  nautobot-static:
