---
# Nornir configuration for Overwatch7Six HQ-TX-01
# https://nornir.readthedocs.io/en/latest/configuration/index.html
#
# Inventory is pulled dynamically from Nautobot via NautobotInventory.
# Connection plugin uses NAPALM (EOS/eAPI).

core:
  num_workers: 4

inventory:
  # nornir-nautobot NautobotInventory pulls hosts, groups, and defaults from
  # the Nautobot API at runtime.
  # https://github.com/nautobot/nornir-nautobot
  plugin: nornir_nautobot.plugins.inventory.nautobot.NautobotInventory
  options:
    nautobot_url: "${NAUTOBOT_URL:http://localhost:8080}"
    nautobot_token: "${NAUTOBOT_TOKEN:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}"
    # Filter to HQ-TX-01 EOS devices only
    filter_parameters:
      location__name: "HQ-TX-01"
      platform__slug: "eos"
      status__name: "Active"

runner:
  plugin: threaded
  options:
    num_workers: 4

logging:
  enabled: true
  level: INFO
  to_console: true
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
